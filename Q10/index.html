<html lang="en">

    </tr>
    <tr bgcolor="lightgrey" align="center">
      <td width="100px" >Math</td>
      <td width="100px" >Science</td>
      <td width="100px" >Math</td>
      <td colspan="2" rowspan="2" width="100px" >Project</td>
      
    </tr>

      <td width="100px" >Math</td>

    </tr>

</body>
</html>
