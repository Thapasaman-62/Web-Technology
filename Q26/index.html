<!DOCTYPE html>
<html lang="en">
<head>
  <title>image gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="gallery-wrapper">
   
    <div class="gallery-grid">
        <div class="gallery-item">
            <div class="img-container">
                <img class="thoroughbred-horse" src="thoroughbred-horse.jpg" alt="Thoroughbred Horse">
            </div>
            <p>Thoroughbred Horse</p>
        </div>
        <div class="gallery-item">
            <div class="img-container">
                <img src="Arabian Horse.png" alt="Arabian Horse">
            </div>
            <p>Arabian Horse</p>
        </div>
        <div class="gallery-item">
            <div class="img-container">
                <img src="Appaloosa-Horse-Breed-Profile.webp" alt="Appaloosa Horse">
            </div>
            <p>Appaloosa Horse</p>
        </div>
        <div class="gallery-item">
            <div class="img-container">
                <img src="Dutch-Warmblood-scaled.jpg" alt="Dutch Warmblood">
            </div>
            <p>Dutch Warmblood</p>
        </div>
        <div class="gallery-item">
            <div class="img-container">
                <img src="717px-mangalarga-2.jpg" alt="Mangalarga Horse">
            </div>
            <p>Mangalarga Horse</p>
        </div>
        <div class="gallery-item">
            <div class="img-container">
                <img src="American-Paint-web.jpg" alt="American Paint Horse">
            </div>
            <p>American Paint Horse</p>
        </div>
        <div class="gallery-item">
            <div class="img-container">
                <img src="morgan-web.jpg" alt="Morgran Horse">
            </div>
            <p>Morgran Horse</p>
        </div>
        <div class="gallery-item">
            <div class="img-container">
                <img src="some-coats-id-love-to-be-added-for-the-mustangs-we-v0-je4782i9jylc1.webp" alt="Mustang Horse">
            </div>
            <p>Mustang Horse</p>
        </div>
    </div>
</div>
</body>
</html>
